[metadata]
name = "databricks-jobs"
description = "List, preview, and trigger Databricks jobs"
requirements = ["databricks", "rg", "bat"]

[source]
command = "databricks jobs list --profile ${DATABRICKS_CONFIG_PROFILE:-DEFAULT} --output text | rg '^(\\d+)\\s+(.*)' -r '$1: $2'"
ansi = false
output = "{}"

[preview]
command = "databricks jobs get {split:\\::0} --profile ${DATABRICKS_CONFIG_PROFILE:-DEFAULT} | bat -l json --color=always"

[ui]
preview_panel = { header = "Config for:{split:\\::1}" }

[keybindings]
enter = "actions:run_job"
ctrl-o = "actions:open_job_ui"

[actions.run_job]
description = "Trigger the selected Databricks job"
command = "databricks jobs run-now {split:\\::0} --profile ${DATABRICKS_CONFIG_PROFILE:-DEFAULT} --timeout 0"
shell = "bash"
mode = "execute"
