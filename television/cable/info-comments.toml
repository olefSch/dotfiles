[metadata]
name = "info-comments"
description = "Find INFO, NOTE, HINT, and TIP comments in the codebase"
requirements = ["rg", "bat"]

[source]
command = "rg -n --color=always -g '!*.ipynb' '(INFO|NOTE|HINT|TIP):?'"
ansi = true
output = "{strip_ansi|split:\\::..2}"

[preview]
command = "bat -n --color=always --highlight-line '{strip_ansi|split:\\::1}' '{strip_ansi|split:\\::0}'"
env = { BAT_THEME = "ansi" }
offset = "{strip_ansi|split:\\::1}"

[ui]
preview_panel = { header = "{strip_ansi|split:\\::..2}" }

[keybindings]
enter = "actions:edit"

[actions.edit]
description = "Open file in editor at the comment"
command = "${EDITOR:-vim} '+{strip_ansi|split:\\::1}' '{strip_ansi|split:\\::0}'"
shell = "bash"
mode = "execute"
