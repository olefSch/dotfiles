[metadata]
name = "databricks-tables"
description = "Search tables in a specific Databricks Catalog"
requirements = ["databricks", "jq", "bat", "column"]

[source]
ansi = false
output = "{}"
command = """
PROFILE=${DATABRICKS_CONFIG_PROFILE:-DEFAULT}
TARGET_CAT=${CATALOG:-main}

# 1. Get all schemas in the catalog, ignoring the noise
SCHEMAS=$(databricks schemas list $TARGET_CAT --profile $PROFILE --output json \
  | jq -r '.[]?.name | select(. != "information_schema")')

# 2. Loop through schemas and list all tables
for s in $SCHEMAS; do
  databricks tables list $TARGET_CAT $s --profile $PROFILE --output json \
    | jq -r '.[]?.full_name'
done
"""

[ui]
preview_panel = { header = "Schema for: {}" }

[keybindings]
enter = "actions:print_schema"

[preview]
command = """
databricks tables get {} --profile ${DATABRICKS_CONFIG_PROFILE:-DEFAULT} --output json \
  | jq -r '.columns[] | [.name, .type_text] | @tsv' \
  | column -t -s $'\\t' \
  | bat --color=always --language=txt
"""

[actions.print_schema]
description = "Print the table schema as a pretty table"
shell = "bash"
mode = "execute"
command = """
databricks tables get {} --profile ${DATABRICKS_CONFIG_PROFILE:-DEFAULT} --output json \
  | jq -r '.columns[] | [.name, .type_text] | @tsv' \
  | column -t -s $'\\t'
"""
